services:
  database:
    image: postgres:13
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./backend/scripts/init-db.sql:/scripts/init-db.sql:ro

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - database

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - database
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USERNAME=local_user
      - DB_PASSWORD=local_user_password
      - DB_DATABASE=kivi
      - JWT_SECRET=change-me-to-a-secure-random-string
      - JWT_REFRESH_SECRET=change-me-to-a-secure-random-string
      - CORS_ORIGIN=http://localhost
    profiles:
      - backend
      - all

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    profiles:
      - frontend
      - all

volumes:
  db_data: